<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Cover - Hadits Pendidikan</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Poppins:wght@300;400&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; background: #fcfbfa; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .cover-card { background: linear-gradient(135deg, #044335 0%, #02261e 100%); width: 100%; max-width: 550px; height: 800px; border-radius: 12px; box-shadow: 0 15px 35px rgba(0,0,0,0.3); border: 8px double #c5a880; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; color: #fff; padding: 40px; position: relative; }
        .ornament { color: #c5a880; font-size: 2rem; margin-bottom: 20px; }
        h1 { font-family: 'Cinzel', serif; font-size: 3.2rem; letter-spacing: 3px; color: #fff; margin: 0; }
        .subtitle { font-size: 1.2rem; letter-spacing: 4px; color: #c5a880; text-transform: uppercase; margin: 15px 0; font-weight: 300; }
        h2 { font-size: 2.2rem; font-weight: 600; letter-spacing: 1px; color: #fff; line-height: 1.3; margin: 10px 0; }
        .divider { width: 60%, height: 1px; background: #c5a880; margin: 25px 0; }
        .tagline { font-size: 1rem; font-style: italic; color: #e2e8f0; max-width: 80%; line-height: 1.5; }
        .footer-tag { position: absolute; bottom: 40px; border: 1px solid #c5a880; padding: 8px 20px; font-size: 0.8rem; letter-spacing: 2px; text-transform: uppercase; background: rgba(255,255,255,0.05); color: #c5a880; }
    </style>
</head>
<body>
    <div class="cover-card">
        <div class="ornament">❖</div>
        <h1>HADITS</h1>
        <div class="subtitle">Tentang</div>
        <h2>PENDIDIKAN AKHLAK<br><span style="font-size:1.3rem; color:#c5a880;">DAN</span><br>PENDIDIKAN SOSIAL</h2>
        <div class="divider"></div>
        <p class="tagline">Himpunan Hadits Pilihan Dilengkapi Terjemahan</p>
        <div class="footer-tag">Untuk Pelajar, Pendidik, dan Masyarakat Umum</div>
    </div>
</body>
</html>
